<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTalks - Cheat Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0d0221;
            color: white;
            padding: 30px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #8E2DE2, #00E676);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stats-card {
            background: rgba(255,71,87,0.1);
            border: 1px solid #ff4757;
            border-radius: 10px;
            padding: 15px 25px;
        }

        .stats-card .label {
            color: #cbd5e1;
            font-size: 14px;
        }

        .stats-card .value {
            font-size: 28px;
            font-weight: 900;
            color: #ff4757;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
        }

        .filter-select {
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            min-width: 150px;
        }

        .table-container {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
            border: 1px solid #ff4757;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            text-align: left;
            padding: 15px;
            background: rgba(255,71,87,0.2);
            color: white;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #cbd5e1;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-cheat {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
        }

        .badge-bot {
            background: rgba(142,45,226,0.2);
            color: #8E2DE2;
        }

        .badge-tamper {
            background: rgba(255,193,7,0.2);
            color: #ffc107;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            background: #ff4757;
            color: white;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,71,87,0.3);
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #8E2DE2;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #8E2DE2;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .page-btn.active {
            background: #8E2DE2;
            border-color: #8E2DE2;
        }

        @media (max-width: 768px) {
            body { padding: 20px; }
            .filter-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🚨 Cheat Detection Logs</h1>
                <p style="color: #cbd5e1;">Monitor suspicious activity and cheating attempts</p>
            </div>
            <a href="admin.html" class="back-btn">← Back to Admin</a>
        </div>

        <!-- Stats -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="stats-card">
                <div class="label">Total Detections</div>
                <div class="value" id="totalDetections">0</div>
            </div>
            <div class="stats-card">
                <div class="label">Last 24 Hours</div>
                <div class="value" id="last24h">0</div>
            </div>
            <div class="stats-card">
                <div class="label">Unique Users</div>
                <div class="value" id="uniqueUsers">0</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
            <input type="text" class="filter-input" id="searchInput" placeholder="Search by user ID, email, or reason...">
            <select class="filter-select" id="typeFilter">
                <option value="all">All Types</option>
                <option value="devtools">DevTools Detection</option>
                <option value="tamper">Code Tampering</option>
                <option value="bot">Bot Detection</option>
                <option value="referral">Referral Abuse</option>
                <option value="balance">Balance Tampering</option>
            </select>
            <select class="filter-select" id="dateFilter">
                <option value="all">All Time</option>
                <option value="today">Today</option>
                <option value="week">Last 7 Days</option>
                <option value="month">Last 30 Days</option>
            </select>
        </div>

        <!-- Logs Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>User ID</th>
                        <th>Email</th>
                        <th>Type</th>
                        <th>Reason</th>
                        <th>URL</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 50px;">Loading logs...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        let logs = [];
        let filteredLogs = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        function filterLogs() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;

            filteredLogs = logs.filter(log => {
                // Search filter
                const matchesSearch = 
                    (log.uid?.toLowerCase() || '').includes(searchTerm) ||
                    (log.email?.toLowerCase() || '').includes(searchTerm) ||
                    (log.reason?.toLowerCase() || '').includes(searchTerm) ||
                    (log.userEmail?.toLowerCase() || '').includes(searchTerm);

                // Type filter
                let matchesType = true;
                if (typeFilter !== 'all') {
                    const reason = log.reason || '';
                    if (typeFilter === 'devtools') matchesType = reason.includes('devtools');
                    else if (typeFilter === 'tamper') matchesType = reason.includes('tamper');
                    else if (typeFilter === 'bot') matchesType = reason.includes('bot');
                    else if (typeFilter === 'referral') matchesType = reason.includes('referral');
                    else if (typeFilter === 'balance') matchesType = reason.includes('balance');
                }

                // Date filter
                let matchesDate = true;
                if (dateFilter !== 'all') {
                    const logTime = log.time?.seconds ? new Date(log.time.seconds * 1000) : new Date(log.time);
                    const now = new Date();
                    
                    if (dateFilter === 'today') {
                        matchesDate = logTime.toDateString() === now.toDateString();
                    } else if (dateFilter === 'week') {
                        const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
                        matchesDate = logTime >= weekAgo;
                    } else if (dateFilter === 'month') {
                        const monthAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);
                        matchesDate = logTime >= monthAgo;
                    }
                }

                return matchesSearch && matchesType && matchesDate;
            });

            updateStats();
            renderTable();
        }

        function updateStats() {
            document.getElementById('totalDetections').textContent = filteredLogs.length;
            
            const last24h = filteredLogs.filter(log => {
                const logTime = log.time?.seconds ? new Date(log.time.seconds * 1000) : new Date(log.time);
                const dayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
                return logTime >= dayAgo;
            }).length;
            document.getElementById('last24h').textContent = last24h;
            
            const uniqueUsers = new Set(filteredLogs.map(log => log.uid || log.userId)).size;
            document.getElementById('uniqueUsers').textContent = uniqueUsers;
        }

        function renderTable() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageLogs = filteredLogs.slice(start, end);
            const totalPages = Math.ceil(filteredLogs.length / itemsPerPage);

            const tbody = document.getElementById('logsTableBody');
            
            if (pageLogs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 50px;">No logs found</td></tr>';
            } else {
                tbody.innerHTML = pageLogs.map(log => {
                    const time = log.time?.seconds ? new Date(log.time.seconds * 1000) : new Date(log.time);
                    const reason = log.reason || '';
                    
                    let badgeClass = 'badge-cheat';
                    if (reason.includes('bot')) badgeClass = 'badge-bot';
                    else if (reason.includes('tamper')) badgeClass = 'badge-tamper';

                    return `
                        <tr>
                            <td>${time.toLocaleString()}</td>
                            <td>${(log.uid || log.userId || '').substring(0,8)}...</td>
                            <td>${log.email || log.userEmail || 'N/A'}</td>
                            <td><span class="badge ${badgeClass}">${reason.split('_')[0] || 'cheat'}</span></td>
                            <td>${reason}</td>
                            <td>${log.url || 'N/A'}</td>
                            <td>
                                <button class="action-btn" onclick="banUser('${log.uid || log.userId}')">Ban User</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            // Pagination
            const pagination = document.getElementById('pagination');
            let pages = '';
            for (let i = 1; i <= totalPages; i++) {
                pages += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            pagination.innerHTML = pages;
        }

        function goToPage(page) {
            currentPage = page;
            renderTable();
        }

        function banUser(userId) {
            if (!userId || userId === 'undefined') {
                alert('Invalid user ID');
                return;
            }
            if (confirm(`Ban user ${userId.substring(0,8)}...?`)) {
                alert('Ban functionality connected to Firebase');
            }
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterLogs);
        document.getElementById('typeFilter').addEventListener('change', filterLogs);
        document.getElementById('dateFilter').addEventListener('change', filterLogs);
    </script>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            getDocs, 
            query, 
            orderBy, 
            limit,
            doc,
            updateDoc 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCgakUnf1xeAy5tU-oQQs84609wnMukNBE",
            authDomain: "moneytalks-a9329.firebaseapp.com",
            projectId: "moneytalks-a9329",
            storageBucket: "moneytalks-a9329.firebasestorage.app",
            messagingSenderId: "865902355512",
            appId: "1:865902355512:web:f67bddc159776db34d72cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "themoneytalks.web@gmail.com";

        onAuthStateChanged(auth, async (user) => {
            if (!user || user.email !== ADMIN_EMAIL) {
                window.location.href = "auth.html";
                return;
            }

            await loadLogs();
        });

        async function loadLogs() {
            try {
                // Load cheat logs
                const cheatSnap = await getDocs(query(collection(db, "cheat_logs"), orderBy("time", "desc"), limit(500)));
                const cheatLogs = cheatSnap.docs.map(doc => doc.data());
                
                // Load bot logs
                const botSnap = await getDocs(query(collection(db, "bot_logs"), orderBy("time", "desc"), limit(500)));
                const botLogs = botSnap.docs.map(doc => doc.data());

                logs = [...cheatLogs, ...botLogs].sort((a, b) => {
                    const timeA = a.time?.seconds || 0;
                    const timeB = b.time?.seconds || 0;
                    return timeB - timeA;
                });

                filteredLogs = logs;
                updateStats();
                renderTable();

            } catch (error) {
                console.error("Error loading logs:", error);
                document.getElementById('logsTableBody').innerHTML = `
                    <tr><td colspan="7" style="text-align: center; padding: 50px; color: #ff4757;">
                        Error loading logs: ${error.message}
                    </td></tr>
                `;
            }
        }

        window.banUser = async function(userId) {
            if (!userId || userId === 'undefined') {
                alert('Invalid user ID');
                return;
            }

            if (!confirm(`Ban user ${userId.substring(0,8)}...?`)) return;

            try {
                const userRef = doc(db, "users", userId);
                await updateDoc(userRef, {
                    banned: true,
                    banReason: 'cheating_detected',
                    bannedAt: new Date()
                });

                alert('User banned successfully');
                
            } catch (error) {
                console.error("Error banning user:", error);
                alert('Error banning user: ' + error.message);
            }
        };
    </script>
</body>
</html>
