<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTalks Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0d0221;
            color: white;
            padding: 30px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #8E2DE2, #00E676);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }

        .admin-badge {
            background: #ff4757;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 15px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(142,45,226,0.3);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(90deg, #8E2DE2, #00E676);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #cbd5e1;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab:hover {
            background: rgba(142,45,226,0.3);
        }

        .tab.active {
            background: linear-gradient(90deg, #8E2DE2, #00E676);
            border-color: transparent;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #8E2DE2;
        }

        .table-container {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
            border: 1px solid rgba(142,45,226,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            text-align: left;
            padding: 15px;
            background: rgba(142,45,226,0.2);
            color: white;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #cbd5e1;
        }

        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: rgba(0,230,118,0.2);
            color: #00E676;
        }

        .status-banned {
            background: rgba(255,71,87,0.2);
            color: #ff4757;
        }

        .status-pending {
            background: rgba(255,193,7,0.2);
            color: #ffc107;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            margin: 0 3px;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: #00E676;
            color: black;
        }

        .btn-add:hover {
            background: #00b050;
            transform: translateY(-2px);
        }

        .btn-ban {
            background: #ff4757;
            color: white;
        }

        .btn-ban:hover {
            background: #ff2e3d;
            transform: translateY(-2px);
        }

        .btn-unban {
            background: #8E2DE2;
            color: white;
        }

        .btn-view {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .logout-btn {
            padding: 10px 24px;
            background: rgba(255,71,87,0.2);
            border: 1px solid #ff4757;
            color: #ff4757;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #ff4757;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #0d0221;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #8E2DE2;
            position: relative;
        }

        .modal-content h3 {
            color: #00E676;
            margin-bottom: 20px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #cbd5e1;
        }

        .close-modal:hover {
            color: white;
        }

        @media (max-width: 768px) {
            body { padding: 20px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div>
                <h1>💰 MoneyTalks Admin Panel</h1>
                <span class="admin-badge">Super Admin</span>
            </div>
            <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
        </div>

        <!-- Stats Overview -->
        <div class="stats-grid" id="statsOverview">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPayments">$0</div>
                <div class="stat-label">Total Payments</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalSpins">0</div>
                <div class="stat-label">Game Spins</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalClicks">0</div>
                <div class="stat-label">Link Clicks</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('users')">👥 Users</button>
            <button class="tab" onclick="switchTab('payments')">💰 Payments</button>
            <button class="tab" onclick="switchTab('spins')">🎮 Game Spins</button>
            <button class="tab" onclick="switchTab('clicks')">🔗 Link Clicks</button>
            <button class="tab" onclick="switchTab('cheats')">🚨 Cheat Logs</button>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by email, username, or ID..." onkeyup="filterTable()">
        </div>

        <!-- Tables Container -->
        <div class="table-container" id="tablesContainer"></div>
    </div>

    <!-- Add Balance Modal -->
    <div class="modal" id="addBalanceModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('addBalanceModal')">&times;</span>
            <h3>➕ Add Balance</h3>
            <input type="number" id="balanceAmount" placeholder="Amount ($)" step="0.01" min="0">
            <input type="text" id="balanceReason" placeholder="Reason (optional)">
            <div class="modal-buttons">
                <button class="action-btn btn-add" onclick="confirmAddBalance()">Add</button>
                <button class="action-btn btn-view" onclick="closeModal('addBalanceModal')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Ban User Modal -->
    <div class="modal" id="banUserModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('banUserModal')">&times;</span>
            <h3>🔨 Ban User</h3>
            <p>Are you sure you want to ban this user?</p>
            <select id="banReason">
                <option value="cheating">Cheating / Exploits</option>
                <option value="abuse">Abusive Behavior</option>
                <option value="fraud">Payment Fraud</option>
                <option value="multiple">Multiple Accounts</option>
                <option value="other">Other</option>
            </select>
            <div class="modal-buttons">
                <button class="action-btn btn-ban" onclick="confirmBanUser()">Ban User</button>
                <button class="action-btn btn-view" onclick="closeModal('banUserModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = null;
        let currentTab = 'users';
        let allData = {
            users: [],
            payments: [],
            spins: [],
            clicks: [],
            cheats: []
        };

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        }

        function filterTable() {
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('tablesContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filteredData = allData[currentTab].filter(item => 
                JSON.stringify(item).toLowerCase().includes(searchTerm)
            );

            switch(currentTab) {
                case 'users':
                    container.innerHTML = renderUsersTable(filteredData);
                    break;
                case 'payments':
                    container.innerHTML = renderPaymentsTable(filteredData);
                    break;
                case 'spins':
                    container.innerHTML = renderSpinsTable(filteredData);
                    break;
                case 'clicks':
                    container.innerHTML = renderClicksTable(filteredData);
                    break;
                case 'cheats':
                    container.innerHTML = renderCheatsTable(filteredData);
                    break;
            }
        }

        function renderUsersTable(users) {
            return `
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Credits</th>
                            <th>Plan</th>
                            <th>Referrals</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>${user.email || 'N/A'}</td>
                                <td>${user.username || 'N/A'}</td>
                                <td>$${(user.credits || 0).toFixed(2)}</td>
                                <td>${user.activePlan || 'Free'}</td>
                                <td>${user.referrals || 0}</td>
                                <td><span class="status-badge ${user.banned ? 'status-banned' : 'status-active'}">${user.banned ? 'Banned' : 'Active'}</span></td>
                                <td>${user.createdAt ? new Date(user.createdAt.seconds * 1000).toLocaleDateString() : 'N/A'}</td>
                                <td>
                                    <button class="action-btn btn-add" onclick="openAddBalanceModal('${user.id}')">+$</button>
                                    ${user.banned ? 
                                        `<button class="action-btn btn-unban" onclick="unbanUser('${user.id}')">Unban</button>` :
                                        `<button class="action-btn btn-ban" onclick="openBanModal('${user.id}')">Ban</button>`
                                    }
                                    <button class="action-btn btn-view" onclick="viewUserDetails('${user.id}')">View</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderPaymentsTable(payments) {
            return `
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Plan</th>
                            <th>Amount</th>
                            <th>Method</th>
                            <th>Payment ID</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${payments.map(payment => `
                            <tr>
                                <td>${payment.userId?.substring(0,8)}...</td>
                                <td>${payment.userEmail || 'N/A'}</td>
                                <td>${payment.plan || 'N/A'}</td>
                                <td>$${payment.price || 0}</td>
                                <td>${payment.method || 'N/A'}</td>
                                <td>${payment.paymentId || 'N/A'}</td>
                                <td>${payment.time ? new Date(payment.time.seconds * 1000).toLocaleString() : 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderSpinsTable(spins) {
            return `
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Outcome</th>
                            <th>Win Amount</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${spins.map(spin => `
                            <tr>
                                <td>${spin.userId?.substring(0,8)}...</td>
                                <td>${spin.userEmail || 'N/A'}</td>
                                <td>${spin.outcome || 'N/A'}</td>
                                <td>$${spin.winAmount || 0}</td>
                                <td>${spin.time ? new Date(spin.time.seconds * 1000).toLocaleString() : 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderClicksTable(clicks) {
            return `
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Site</th>
                            <th>Category</th>
                            <th>Earnings</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${clicks.map(click => `
                            <tr>
                                <td>${click.userId?.substring(0,8)}...</td>
                                <td>${click.userEmail || 'N/A'}</td>
                                <td>${click.siteName || 'N/A'}</td>
                                <td>${click.category || 'N/A'}</td>
                                <td>$${(click.earnings || 0).toFixed(3)}</td>
                                <td>${click.timestamp ? new Date(click.timestamp.seconds * 1000).toLocaleString() : 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderCheatsTable(cheats) {
            return `
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Reason</th>
                            <th>URL</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${cheats.map(cheat => `
                            <tr>
                                <td>${cheat.uid || cheat.userId?.substring(0,8)}...</td>
                                <td>${cheat.email || cheat.userEmail || 'N/A'}</td>
                                <td>${cheat.reason || 'N/A'}</td>
                                <td>${cheat.url || 'N/A'}</td>
                                <td>${cheat.time ? new Date(cheat.time.seconds * 1000).toLocaleString() : 'N/A'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function openAddBalanceModal(userId) {
            currentUserId = userId;
            document.getElementById('addBalanceModal').style.display = 'flex';
        }

        function openBanModal(userId) {
            currentUserId = userId;
            document.getElementById('banUserModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // These functions will be connected to Firebase
        function confirmAddBalance() {
            alert('Connected to Firebase - Add balance functionality');
            closeModal('addBalanceModal');
        }

        function confirmBanUser() {
            alert('Connected to Firebase - Ban user functionality');
            closeModal('banUserModal');
        }

        function unbanUser(userId) {
            alert('Connected to Firebase - Unban user functionality');
        }

        function viewUserDetails(userId) {
            alert('View user details - User ID: ' + userId);
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.location.href = 'auth.html';
        });
    </script>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged,
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            getDocs, 
            query, 
            orderBy, 
            limit,
            doc,
            updateDoc,
            increment,
            where
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAZcSSmPJR_mTCuGhuykG9puT9rzvb9oTE",
            authDomain: "moneytalks-a9329.firebaseapp.com",
            projectId: "moneytalks-a9329",
            storageBucket: "moneytalks-a9329.firebasestorage.app",
            messagingSenderId: "865902355512",
            appId: "1:865902355512:web:f67bddc159776db34d72cd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = "themoneytalks.web@gmail.com";

        // Check authentication
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "auth.html";
                return;
            }

            if (user.email !== ADMIN_EMAIL) {
                alert("Access denied. Admin only.");
                window.location.href = "dashboard.html";
                return;
            }

            // Load all data
            await loadAllData();
        });

        async function loadAllData() {
            try {
                // Load users
                const usersSnap = await getDocs(collection(db, "users"));
                allData.users = usersSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Load payments
                const paymentsSnap = await getDocs(query(collection(db, "payments"), orderBy("time", "desc"), limit(100)));
                allData.payments = paymentsSnap.docs.map(doc => doc.data());
                
                // Load game logs
                const gameSnap = await getDocs(query(collection(db, "game_logs"), orderBy("time", "desc"), limit(100)));
                allData.spins = gameSnap.docs.map(doc => doc.data());
                
                // Load link clicks
                const clicksSnap = await getDocs(query(collection(db, "link_clicks"), orderBy("timestamp", "desc"), limit(100)));
                allData.clicks = clicksSnap.docs.map(doc => doc.data());
                
                // Load cheat logs
                const cheatSnap = await getDocs(query(collection(db, "cheat_logs"), orderBy("time", "desc"), limit(100)));
                allData.cheats = cheatSnap.docs.map(doc => doc.data());

                // Update stats
                updateStats();

                // Render initial table
                renderTable();

            } catch (error) {
                console.error("Error loading data:", error);
            }
        }

        function updateStats() {
            document.getElementById('totalUsers').textContent = allData.users.length;
            
            const totalPayments = allData.payments.reduce((sum, p) => sum + (p.price || 0), 0);
            document.getElementById('totalPayments').textContent = '$' + totalPayments.toFixed(2);
            
            document.getElementById('totalSpins').textContent = allData.spins.length;
            document.getElementById('totalClicks').textContent = allData.clicks.length;
        }

        // Override admin functions with real Firebase implementation
        window.confirmAddBalance = async function() {
            const amount = parseFloat(document.getElementById('balanceAmount').value);
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            try {
                const userRef = doc(db, "users", currentUserId);
                await updateDoc(userRef, {
                    credits: increment(amount)
                });

                alert(`✅ Added $${amount.toFixed(2)} to user balance`);
                closeModal('addBalanceModal');
                await loadAllData(); // Reload data
                
            } catch (error) {
                console.error("Error adding balance:", error);
                alert("Error adding balance: " + error.message);
            }
        };

        window.confirmBanUser = async function() {
            const reason = document.getElementById('banReason').value;

            try {
                const userRef = doc(db, "users", currentUserId);
                await updateDoc(userRef, {
                    banned: true,
                    banReason: reason,
                    bannedAt: new Date()
                });

                alert(`✅ User banned successfully`);
                closeModal('banUserModal');
                await loadAllData(); // Reload data
                
            } catch (error) {
                console.error("Error banning user:", error);
                alert("Error banning user: " + error.message);
            }
        };

        window.unbanUser = async function(userId) {
            if (!confirm('Unban this user?')) return;

            try {
                const userRef = doc(db, "users", userId);
                await updateDoc(userRef, {
                    banned: false,
                    banReason: null
                });

                alert(`✅ User unbanned successfully`);
                await loadAllData(); // Reload data
                
            } catch (error) {
                console.error("Error unbanning user:", error);
                alert("Error unbanning user: " + error.message);
            }
        };

        window.viewUserDetails = function(userId) {
            const user = allData.users.find(u => u.id === userId);
            if (!user) return;

            const userPayments = allData.payments.filter(p => p.userId === userId);
            const userSpins = allData.spins.filter(s => s.userId === userId);
            const userClicks = allData.clicks.filter(c => c.userId === userId);

            alert(`
👤 User Details:
Email: ${user.email}
Username: ${user.username}
Credits: $${user.credits || 0}
Plan: ${user.activePlan || 'Free'}
Referrals: ${user.referrals || 0}
Joined: ${user.createdAt ? new Date(user.createdAt.seconds * 1000).toLocaleDateString() : 'N/A'}

📊 Stats:
Payments: ${userPayments.length} ($${userPayments.reduce((s,p)=>s+(p.price||0),0).toFixed(2)})
Spins: ${userSpins.length}
Clicks: ${userClicks.length}
            `);
        };

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        };

        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateY(-20px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
            .table-container { animation: slideIn 0.5s ease; }
        `;
        document.head.appendChild(style);

    </script>
